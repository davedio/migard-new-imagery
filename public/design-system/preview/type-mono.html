<!-- @dsCard group="Type" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--deep-ink); padding: 26px 30px; }
  .specimen { font-family: var(--font-mono); color: var(--green-bright); font-size: 30px; letter-spacing: 0.02em; }
  .meta { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.16em; color: var(--text-dim); text-transform: uppercase; margin-top: 10px; }
  .uses { margin-top: 22px; display: grid; gap: 12px; }
  .use { display: flex; align-items: center; gap: 16px; }
  .tag { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.18em; color: var(--text-faint); text-transform: uppercase; width: 86px; flex: 0 0 auto; }
  .eg { font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="specimen">0x4291a…f7c2 · 18.4 ops/s</div>
  <div class="meta">JetBrains Mono · the connective tissue of the UI</div>
  <div class="uses">
    <div class="use"><span class="tag">Eyebrow</span><span class="eg" style="font-size:11px;letter-spacing:0.28em;color:var(--text-dim);text-transform:uppercase">TRUST ARCHITECTURE</span></div>
    <div class="use"><span class="tag">Chip</span><span class="eg" style="font-size:11px;color:var(--gold-bright)">Pre-alpha testnet</span></div>
    <div class="use"><span class="tag">Metric</span><span class="eg" style="font-size:14px;color:var(--green-bright)">BLOCK #4,291,860</span></div>
    <div class="use"><span class="tag">CTA</span><span class="eg" style="font-size:12.5px;letter-spacing:0.06em;color:var(--text-hi)">Get Started</span></div>
  </div>
</body>
</html>
