<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--deep-ink); padding: 24px 30px; }
  .cap { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.14em; color: var(--text-faint); text-transform: uppercase; margin-bottom: 16px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .sig { border-radius: var(--r); padding: 16px 16px 14px; border: 1px solid; display: flex; flex-direction: column; gap: 10px; min-height: 92px; }
  .dot { width: 11px; height: 11px; border-radius: 50%; }
  .role { font-family: var(--font-mono); font-size: 12.5px; letter-spacing: 0.04em; }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); margin-top: auto; }
  /* high-contrast signal states */
  .valid { background: rgba(32,190,67,0.16); border-color: var(--green-bright); }
  .valid .dot { background: var(--green-bright); box-shadow: 0 0 12px var(--green-bright); }
  .valid .role { color: var(--green-bright); }
  .proof { background: rgba(224,163,60,0.16); border-color: var(--gold-bright); }
  .proof .dot { background: var(--gold-bright); box-shadow: 0 0 12px var(--gold-bright); }
  .proof .role { color: var(--gold-bright); }
  .l1 { background: rgba(127,160,240,0.16); border-color: #7fa0f0; }
  .l1 .dot { background: #7fa0f0; box-shadow: 0 0 12px #7fa0f0; }
  .l1 .role { color: #7fa0f0; }
</style>
</head>
<body>
  <div class="cap">Signal &amp; proof — three states, full contrast</div>
  <div class="grid">
    <div class="sig valid">
      <div class="dot"></div>
      <div class="role">LIVE · VALID</div>
      <div class="hex">green · #3be863</div>
    </div>
    <div class="sig proof">
      <div class="dot"></div>
      <div class="role">PROOF · SETTLED</div>
      <div class="hex">gold · #e0a33c</div>
    </div>
    <div class="sig l1">
      <div class="dot"></div>
      <div class="role">CARDANO L1</div>
      <div class="hex">blue · #7fa0f0</div>
    </div>
  </div>
</body>
</html>
