<!-- @dsCard group="Spacing" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../midgard.css">
<style>
  html, body { margin: 0; height: 100%; }
  body { position: relative; height: 300px; overflow: hidden; background: var(--deep-ink); }
  #net { position: absolute; inset: 0; z-index: 1; display: block; }
  .label { position: absolute; left: 30px; bottom: 22px; z-index: 70; max-width: 470px; }
  .label .t { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; color: var(--text-hi); }
  .label .s { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); margin-top: 6px; line-height: 1.7; }
</style>
</head>
<body>
  <!-- layer 1: ambient world gradient -->
  <div class="world-bg" style="position:absolute; z-index:0"></div>
  <!-- layer 2: generative node/constellation network — the ledger over the roots -->
  <canvas id="net"></canvas>
  <!-- layer 3: film grain -->
  <div class="world-grain" style="position:absolute; z-index:60"></div>

  <div class="label">
    <div class="t">Ambient background — interior pages</div>
    <div class="s">For non-hero pages (docs, users, builders) that have no world-tree photo: world-gradient · drifting node network with proof links · gold settlement pulses · film grain.</div>
  </div>

  <script>
  (function () {
    const c = document.getElementById('net');
    const ctx = c.getContext('2d');
    const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
    let W, H, DPR, nodes, raf, t = 0;

    function resize() {
      DPR = Math.min(devicePixelRatio || 1, 2);
      W = c.clientWidth; H = c.clientHeight;
      c.width = W * DPR; c.height = H * DPR;
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    }

    function seed() {
      const n = Math.round((W * H) / 9000); // density
      nodes = Array.from({ length: Math.max(26, Math.min(n, 64)) }, () => ({
        x: Math.random() * W,
        y: Math.random() * H,
        vx: (Math.random() - 0.5) * 0.16,
        vy: (Math.random() - 0.5) * 0.14,
        r: Math.random() * 1.6 + 0.8,
        gold: Math.random() < 0.14,        // some are gold "proof" nodes
        ph: Math.random() * Math.PI * 2,   // pulse phase
      }));
    }

    function frame() {
      t += 0.016;
      ctx.clearRect(0, 0, W, H);

      // links between nearby nodes
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          const a = nodes[i], b = nodes[j];
          const dx = a.x - b.x, dy = a.y - b.y;
          const d2 = dx * dx + dy * dy;
          if (d2 < 118 * 118) {
            const al = (1 - Math.sqrt(d2) / 118) * 0.30;
            const goldLink = a.gold || b.gold;
            ctx.strokeStyle = goldLink
              ? 'rgba(224,163,60,' + (al * 0.9).toFixed(3) + ')'
              : 'rgba(32,190,67,' + al.toFixed(3) + ')';
            ctx.lineWidth = goldLink ? 0.7 : 0.5;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();
          }
        }
      }

      // nodes
      for (const p of nodes) {
        p.x += p.vx; p.y += p.vy;
        if (p.x < -10) p.x = W + 10; if (p.x > W + 10) p.x = -10;
        if (p.y < -10) p.y = H + 10; if (p.y > H + 10) p.y = -10;

        const pulse = p.gold ? 0.6 + 0.4 * Math.sin(t * 1.6 + p.ph) : 0.85;
        if (p.gold) {
          ctx.shadowColor = 'rgba(224,163,60,0.9)';
          ctx.shadowBlur = 10 * pulse;
          ctx.fillStyle = 'rgba(224,163,60,' + pulse.toFixed(2) + ')';
        } else {
          ctx.shadowColor = 'rgba(59,232,99,0.7)';
          ctx.shadowBlur = 6;
          ctx.fillStyle = 'rgba(59,232,99,0.85)';
        }
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * (p.gold ? 1.5 : 1), 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.shadowBlur = 0;

      if (!reduce) raf = requestAnimationFrame(frame);
    }

    function start() { resize(); seed(); cancelAnimationFrame(raf); frame(); }
    addEventListener('resize', start);
    start();
  })();
  </script>
</body>
</html>
