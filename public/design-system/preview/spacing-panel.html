<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../midgard.css">
<style>
  body { margin: 0; background: var(--deep-ink); padding: 26px 30px; }
  .cap { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.14em; color: var(--text-faint); text-transform: uppercase; margin-bottom: 16px; }
  .panel { padding: 22px 24px; max-width: 340px; }
  .panel h3 { font-family: var(--font-display); font-size: 17px; color: var(--text-hi); margin: 0; }
  .panel p { font-size: 13.5px; color: var(--text-dim); margin: 8px 0 0; }
  .note { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-dim); margin-top: 14px; line-height: 1.7; }
</style>
</head>
<body>
  <div class="cap">Panel — the core surface</div>
  <div style="display:flex; gap:24px; align-items:flex-start">
    <div class="panel">
      <h3>Trust architecture</h3>
      <p>Proofs, challenges, and L1 settlement keep the path checkable.</p>
    </div>
    <div class="note">
      • fill: panel #0c1610 + top sheen<br>
      • 1px hairline border (mist / 9%)<br>
      • gold gradient top-line via ::before<br>
      • radius 8px, no drop shadow
    </div>
  </div>
</body>
</html>
