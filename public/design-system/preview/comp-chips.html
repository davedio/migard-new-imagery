<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../midgard.css">
<style>
  body { margin: 0; background: var(--deep-ink); padding: 28px 30px; }
  .cap { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.14em; color: var(--text-faint); text-transform: uppercase; margin-bottom: 18px; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .note { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); margin-top: 20px; line-height: 1.8; }
</style>
</head>
<body>
  <div class="cap">Status chips — the network's vocabulary</div>
  <div class="row">
    <span class="chip chip--live"><span class="dot"></span>Live L1 · sim L2</span>
    <span class="chip chip--testnet"><span class="dot"></span>Pre-alpha testnet</span>
    <span class="chip chip--proof"><span class="dot"></span>Proof object</span>
    <span class="chip chip--l1"><span class="dot"></span>Cardano L1 anchor</span>
    <span class="chip chip--demo"><span class="dot"></span>Simulated data</span>
  </div>
  <div class="note">live: pulsing green · testnet/proof: gold fill · l1: cardano blue · demo: neutral · each carries a filled tint + brighter border for contrast.</div>
</body>
</html>
