<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 26px 30px; display: flex; gap: 22px; align-items: center; }
  body { background: var(--deep-ink); }
  .tile { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .tile img { height: 78px; }
  .swatch { width: 100px; height: 100px; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
  .cap { font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 0.1em; color: var(--text-dim); text-transform: uppercase; }
</style>
</head>
<body>
  <div class="tile">
    <div class="swatch" style="background:var(--deep-ink);border:1px solid var(--panel-edge)"><img src="../assets/midgard-icon.png" alt="icon"></div>
    <span class="cap">On ink</span>
  </div>
  <div class="tile">
    <div class="swatch" style="background:var(--obsidian);border:1px solid var(--panel-edge)"><img src="../assets/midgard-icon.png" alt="icon"></div>
    <span class="cap">On obsidian</span>
  </div>
  <div class="tile">
    <div class="swatch" style="background:#f8faf5"><img src="../assets/midgard-icon.png" alt="icon"></div>
    <span class="cap">On paper</span>
  </div>
  <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-dim);line-height:1.8;max-width:170px">Tree-in-circle mark. Green vertical gradient (#16a a→#3be863). Reads on light or dark.</div>
</body>
</html>
