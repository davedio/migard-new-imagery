<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../midgard.css">
<style>
  body { margin: 0; background:
    radial-gradient(90% 120% at 18% 0%, rgba(32,190,67,0.07), transparent 60%), var(--deep-ink);
    padding: 28px 30px; }
  /* more prominent card: lighter opaque surface, layered depth + green lift */
  .card.feature {
    max-width: 340px; padding: 26px 26px 24px;
    background: linear-gradient(180deg, rgba(215,226,216,0.06), rgba(215,226,216,0.012) 42%), #121d17;
    border-color: var(--panel-edge-strong);
    box-shadow:
      0 28px 60px -22px rgba(0,0,0,0.9),
      0 10px 22px -10px rgba(0,0,0,0.62),
      0 0 42px -20px var(--green-glow),
      inset 0 1px 0 rgba(215,226,216,0.08);
  }
  .card.feature::before { opacity: 0.85; height: 2px; }
  .card.feature .card__num { font-size: 12px; color: var(--gold-bright); }
  .card.feature h3 { font-size: 21px; font-weight: 600; margin-top: 12px; }
  .card.feature p { font-size: 14.5px; color: var(--text); }
  .card.feature .card__cta { font-size: 13px; color: var(--green-bright); margin-top: 18px; }
</style>
</head>
<body>
  <div class="panel card feature">
    <div class="card__num">01</div>
    <h3>Read the architecture</h3>
    <p>Understand the rollup model, state transition path, challenge design, and settlement assumptions.</p>
    <div class="card__cta">Open builder path →</div>
  </div>
</body>
</html>
