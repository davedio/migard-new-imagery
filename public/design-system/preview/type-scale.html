<!-- @dsCard group="Type" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--deep-ink); padding: 24px 30px; display: grid; gap: 14px; }
  .line { display: grid; grid-template-columns: 92px 1fr; align-items: baseline; gap: 18px; }
  .tag { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.12em; color: var(--text-dim); text-transform: uppercase; }
  h1 { font-size: 54px; line-height: 1.04; }
  h2 { font-size: 39px; line-height: 1.12; }
  h3 { font-size: 26px; }
  .lead { font-family: var(--font-body); font-size: 23px; color: var(--text); }
  .body { font-family: var(--font-body); font-size: 22px; color: var(--text); line-height: 1.5; }
</style>
</head>
<body>
  <div class="line"><span class="tag">H1 / Display</span><h1>Built to scale.</h1></div>
  <div class="line"><span class="tag">H2 / Section</span><h2>Rooted in Cardano.</h2></div>
  <div class="line"><span class="tag">H3 / Card</span><h3>Cardano-native execution</h3></div>
  <div class="line"><span class="tag">Lead</span><p class="lead">A trust path you can check.</p></div>
  <div class="line"><span class="tag">Body</span><p class="body">Activity happens on L2. Transactions are batched. State anchors back to Cardano L1.</p></div>
</body>
</html>
