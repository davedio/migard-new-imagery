<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--deep-ink); padding: 26px 30px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .sw { display: flex; flex-direction: column; gap: 8px; }
  .chip { height: 72px; border-radius: var(--r); border: 1px solid var(--panel-edge); }
  .nm { font-family: var(--font-mono); font-size: 13px; color: var(--text-hi); }
  .hex { font-family: var(--font-mono); font-size: 12px; color: var(--text-dim); }
</style>
</head>
<body>
  <div class="grid" style="grid-template-columns:repeat(4,1fr)">
    <div class="sw"><div class="chip" style="background:#20be43"></div><div class="nm">Midgard Green</div><div class="hex">#20be43</div></div>
    <div class="sw"><div class="chip" style="background:#cf9a2e"></div><div class="nm">Gold</div><div class="hex">#cf9a2e</div></div>
    <div class="sw"><div class="chip" style="background:#d7e2d8"></div><div class="nm">Mist</div><div class="hex">#d7e2d8</div></div>
    <div class="sw"><div class="chip" style="background:#07120b"></div><div class="nm">Deep Ink</div><div class="hex">#07120b</div></div>
  </div>
</body>
</html>
