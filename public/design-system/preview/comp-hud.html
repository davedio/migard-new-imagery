<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../midgard.css">
<style>
  html, body { margin: 0; }
  body { position: relative; height: 260px; overflow: hidden; background: var(--deep-ink); }
  .page { position: absolute; inset: 0; }
  .world { position: absolute; inset: 0; z-index: 0; }
  /* faux page chrome so placement reads */
  .nav { position: absolute; top: 0; left: 0; right: 0; z-index: 5; display: flex; align-items: center; justify-content: space-between; padding: 12px 18px; }
  .nav .brand { display: flex; align-items: center; gap: 8px; font-family: var(--font-display); font-weight: 500; color: var(--text-hi); font-size: 14px; }
  .nav .brand .mk { width: 16px; height: 16px; border-radius: 50%; border: 1.5px solid var(--green-bright); }
  .nav .links { display: flex; gap: 16px; }
  .nav .links span { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); }
  .nav .links span.on { color: var(--green-bright); }
  .ph { position: absolute; left: 18px; top: 64px; z-index: 4; }
  .ph .eye { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.2em; color: var(--text-faint); text-transform: uppercase; }
  .ph h2 { font-family: var(--font-display); font-weight: 500; color: var(--text-hi); font-size: 22px; margin: 8px 0 0; }
  /* the HUD — pinned TOP-RIGHT to track the live testnet */
  .hud { position: absolute; top: 116px; left: 30px; z-index: 20; padding: 13px 15px; display: grid; gap: 7px; min-width: 214px;
    background:
      linear-gradient(180deg, rgba(215,226,216,0.06), transparent 42%),
      linear-gradient(180deg, rgba(14,26,19,0.97), rgba(8,16,11,0.96));
    border-color: var(--panel-edge-strong);
    transform: perspective(1100px) rotateY(-11deg) rotateX(4deg);
    transform-style: preserve-3d;
    box-shadow:
      0 34px 62px -22px rgba(0,0,0,0.82),
      0 14px 26px -14px rgba(0,0,0,0.66),
      0 20px 52px -26px var(--green-glow),
      inset 0 1px 0 rgba(215,226,216,0.13),
      inset 0 0 30px rgba(32,190,67,0.10); }
  .hud .metric-row .v { text-shadow: 0 0 10px rgba(59,232,99,0.35); }
  .hud .head { display: flex; justify-content: space-between; align-items: center; gap: 16px; }
  .hud .time { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); }
  .tag { position: absolute; right: 18px; top: 70px; z-index: 20; font-family: var(--font-mono); font-size: 9.5px; color: var(--text-dim); text-align: right; max-width: 180px; line-height: 1.7; }
</style>
</head>
<body>
  <div class="page">
    <div class="world world-bg"></div>
    <div class="nav">
      <div class="brand"><span class="mk"></span>Midgard</div>
      <div class="links"><span>Docs</span><span class="on">Testnet</span></div>
    </div>
    <div class="ph">
      <div class="eye">Testnet · What is live</div>
      <h2>Deployed and verifiable surfaces.</h2>
    </div>
    <div class="hud panel">
      <div class="head">
        <span class="chip chip--live"><span class="dot"></span>Live L1 · sim L2</span>
        <span class="time">3:47:22 PM</span>
      </div>
      <div class="metric-row"><span class="k">L1 block</span><span class="v">#4,291,860</span></div>
      <div class="metric-row"><span class="k">Batch queue</span><span class="v">18 ops</span></div>
      <div class="metric-row"><span class="k">Proof</span><span class="v">GENERATED</span></div>
    </div>
    <div class="tag">inline status widget on /testnet<br>tracks the NetworkSnapshot — live L1,<br>simulated L2 — refreshed each second</div>
  </div>
</body>
</html>
