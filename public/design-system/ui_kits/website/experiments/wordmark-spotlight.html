<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Midgard — Wordmark Spotlight (Syne)</title>
<link rel="icon" href="../assets/midgard-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; min-height: 100%; }
  body { background:
    radial-gradient(120% 80% at 50% -10%, rgba(183,121,31,0.05), transparent 55%),
    radial-gradient(100% 80% at 50% 130%, rgba(32,190,67,0.07), transparent 60%), var(--deep-ink);
    color: var(--text); font-family: var(--font-body); min-height: 100vh; display: flex; flex-direction: column; }
  .head { padding: 26px clamp(20px,5vw,52px) 0; }
  .head .eye { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--green-bright); }
  .head h1 { font-family: "Syne", sans-serif; font-weight: 700; font-size: 22px; color: var(--text-hi); margin: 8px 0 4px; }
  .head p { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); margin: 0; }

  .arena { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 30px; padding: 30px 20px 60px; }

  /* the spotlight wordmark */
  .word { position: relative; display: inline-block; font-family: "Syne", sans-serif; font-weight: 700;
    font-size: clamp(58px, 11vw, 128px); line-height: 1; letter-spacing: var(--ls, 0em); cursor: default; user-select: none; }
  .word .layer { display: block; white-space: nowrap; }
  .word .base { color: #eaf2ec; }
  .word .glow { position: absolute; inset: 0; color: var(--green-bright); opacity: var(--o, 0);
    -webkit-mask-image: radial-gradient(circle 130px at var(--mx, -600px) var(--my, -600px), #000 0%, #000 50%, transparent 100%);
    mask-image: radial-gradient(circle 130px at var(--mx, -600px) var(--my, -600px), #000 0%, #000 50%, transparent 100%);
    text-shadow: 0 0 26px rgba(59,232,99,0.45); }

  .hint { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="head">
    <div class="eye">Wordmark · Syne</div>
    <h1>Cursor spotlight — green follows the pointer</h1>
    <p>Move across the wordmark: a soft circle of green lights the white letters and parts them slightly. It eases back slowly when you leave.</p>
  </div>

  <div class="arena">
    <div class="word" id="word">
      <span class="layer base">Midgard</span>
      <span class="layer glow" aria-hidden="true">Midgard</span>
    </div>
    <div class="hint">Move your cursor over Midgard</div>
  </div>

  <script>
  (function () {
    const word = document.getElementById("word");
    let smx = -500, smy = -500, tx = -500, ty = -500, o = 0, ls = 0, inside = false;

    function onMove(e) {
      const r = word.getBoundingClientRect();
      tx = e.clientX - r.left; ty = e.clientY - r.top;
      const m = 60; // generous hit margin so the circle engages near the letters
      inside = e.clientX > r.left - m && e.clientX < r.right + m && e.clientY > r.top - m && e.clientY < r.bottom + m;
    }
    addEventListener("mousemove", onMove, { passive: true });
    document.addEventListener("mouseleave", () => { inside = false; });

    function loop() {
      smx += (tx - smx) * 0.18; smy += (ty - smy) * 0.18;          // soft trail
      const to = inside ? 1 : 0; o += (to - o) * (to > o ? 0.12 : 0.025);  // gentle open, slow fade out
      const tls = inside ? 0.05 : 0; ls += (tls - ls) * (tls > ls ? 0.05 : 0.007); // open slowly, settle even slower
      word.style.setProperty("--mx", smx.toFixed(1) + "px");
      word.style.setProperty("--my", smy.toFixed(1) + "px");
      word.style.setProperty("--o", o.toFixed(3));
      word.style.setProperty("--ls", ls.toFixed(4) + "em");
      requestAnimationFrame(loop);
    }
    loop();
  })();
  </script>
</body>
</html>
