<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background:
    radial-gradient(120% 90% at 50% -20%, rgba(183,121,31,0.08), transparent 55%),
    radial-gradient(100% 70% at 50% 130%, rgba(32,190,67,0.08), transparent 60%), var(--deep-ink);
    padding: 30px; display: flex; align-items: center; gap: 28px; }
  .mark { display: flex; align-items: center; gap: 16px; }
  .mark img.icon { height: 64px; }
  .mark .word { font-family: var(--font-display); font-weight: 500; font-size: 40px; color: var(--text-hi); letter-spacing: -0.01em; }
  .note { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); line-height: 1.8; }
</style>
</head>
<body>
  <div class="mark">
    <img class="icon" src="../assets/midgard-icon.png" alt="Midgard">
    <span class="word">Midgard</span>
  </div>
  <div class="note">World-tree mark + Poppins wordmark.<br>Lives on dark only — wordmark is light.<br>Logo lockup ships as one white PNG.</div>
</body>
</html>
