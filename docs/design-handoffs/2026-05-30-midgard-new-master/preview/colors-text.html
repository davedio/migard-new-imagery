<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--deep-ink); padding: 24px 30px; }
  .cap { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.14em; color: var(--text-faint); text-transform: uppercase; margin-bottom: 18px; }
  .rows { display: grid; gap: 14px; }
  .r { display: flex; align-items: center; gap: 16px; }
  .swatch { width: 40px; height: 24px; border-radius: 4px; border: 1px solid var(--panel-edge); flex: 0 0 auto; }
  .sample { font-family: var(--font-body); font-size: 16px; flex: 1; }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); width: 130px; flex: 0 0 auto; }
</style>
</head>
<body>
  <div class="cap">Text hierarchy on Deep Ink</div>
  <div class="rows">
    <div class="r"><span class="swatch" style="background:#eaf2ec"></span><span class="sample" style="color:#eaf2ec">Headings &amp; emphasis</span><span class="lbl">text-hi · #eaf2ec</span></div>
    <div class="r"><span class="swatch" style="background:#b7c6bc"></span><span class="sample" style="color:#b7c6bc">Body copy reads here</span><span class="lbl">text · #b7c6bc</span></div>
    <div class="r"><span class="swatch" style="background:#7c8f84"></span><span class="sample" style="color:#7c8f84">Secondary &amp; captions</span><span class="lbl">text-dim · #7c8f84</span></div>
    <div class="r"><span class="swatch" style="background:#51635a"></span><span class="sample" style="color:#51635a">Legal &amp; meta, faint</span><span class="lbl">text-faint · #51635a</span></div>
  </div>
</body>
</html>
