<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 0; position: relative; height: 300px; overflow: hidden; }
  .bg { position: absolute; inset: 0; background-image: url("../assets/hero-tree-green.png"); background-size: cover; background-position: 50% 42%; filter: brightness(0.5) saturate(0.9); }
  .veil { position: absolute; inset: 0; background: radial-gradient(120% 90% at 50% 38%, transparent 16%, rgba(5,12,8,0.5) 60%, rgba(4,9,6,0.9)); }
  .content { position: absolute; left: 30px; bottom: 26px; z-index: 2; }
  .eyebrow { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--text-dim); }
  h1 { font-family: var(--font-display); font-weight: 500; color: #eaf2ec; font-size: 30px; margin: 12px 0 0; letter-spacing: -0.01em; }
  h1 span { color: var(--green-bright); }
  .cap { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); margin-top: 10px; }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="veil"></div>
  <div class="content">
    <div class="eyebrow">Cardano-native optimistic rollup</div>
    <h1>Built for throughput. Secured by <span>Math</span>.</h1>
    <div class="cap">Yggdrasil world-tree · glowing green sap · dark mythic atmosphere · drift animation</div>
  </div>
</body>
</html>
