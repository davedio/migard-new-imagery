<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--deep-ink); padding: 26px 28px; }
  .cap { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.14em; color: var(--text-faint); text-transform: uppercase; margin-bottom: 22px; }
  .flow { display: flex; align-items: stretch; gap: 0; position: relative; }
  .flow::before { content: ""; position: absolute; top: 16px; left: 44px; right: 44px; height: 2px; z-index: 0;
    background: linear-gradient(90deg, rgba(32,190,67,0.55), rgba(224,163,60,0.55) 55%, rgba(127,160,240,0.55)); opacity: 0.4; }
  .step { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 9px; text-align: center; position: relative; z-index: 1; }
  .badge {
    width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 12px; color: var(--gold-bright);
    border: 1px solid var(--gold-line); background: rgba(183,121,31,0.10);
  }
  .name { font-family: var(--font-display); font-weight: 500; font-size: 12px; color: var(--text-hi); line-height: 1.2; letter-spacing: -0.01em; }
  .arrow { display: flex; align-items: flex-start; padding-top: 10px; color: var(--text-faint); font-family: var(--font-mono); font-size: 15px; flex: 0 0 14px; position: relative; z-index: 1; }
  /* progression accents — green start, gold proof, blue L1 anchor */
  .step.start .badge { color: var(--green-bright); border-color: rgba(32,190,67,0.6); background: rgba(32,190,67,0.12); box-shadow: 0 0 14px rgba(32,190,67,0.25); }
  .step.l1 .badge { color: #7fa0f0; border-color: rgba(0,51,173,0.7); background: rgba(127,160,240,0.12); box-shadow: 0 0 14px rgba(127,160,240,0.22); }
  .step.l1 .name { color: #aebff5; }
  .sub { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); margin-top: 28px; white-space: nowrap; }
</style>
</head>
<body>
  <div class="cap">The six-layer trust path — read left to right</div>
  <div class="flow">
    <div class="step start"><div class="badge">01</div><div class="name">Activity</div></div>
    <div class="arrow">›</div>
    <div class="step"><div class="badge">02</div><div class="name">Batch</div></div>
    <div class="arrow">›</div>
    <div class="step"><div class="badge">03</div><div class="name">Proof</div></div>
    <div class="arrow">›</div>
    <div class="step"><div class="badge">04</div><div class="name">Challenge</div></div>
    <div class="arrow">›</div>
    <div class="step"><div class="badge">05</div><div class="name">Settlement</div></div>
    <div class="arrow">›</div>
    <div class="step l1"><div class="badge">06</div><div class="name">Cardano&nbsp;L1</div></div>
  </div>
  <div class="sub">Fast on L2 → anchored as proof → resolved to Cardano L1.</div>
</body>
</html>
