<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

<style>
  body { margin: 0; background: var(--deep-ink); padding: 30px; display: grid; gap: 22px; }

  .voice { font-family: var(--font-mono); font-size: 12.5px; color: var(--text); line-height: 2; }
  .voice b { color: var(--green-bright); font-weight: 400; }

</style>

<body>
  <div class="eyebrow">TRUST ARCHITECTURE</div>
  <div class="voice">
    Built for throughput. Secured by <b>math</b>.<br>
    Make Cardano more usable without making it <b>less Cardano</b>.<br>
    <span class="dim">Not speed for the sake of a number. Throughput with a trust path.</span>
  </div>
