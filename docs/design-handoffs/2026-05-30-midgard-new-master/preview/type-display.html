<!-- @dsCard group="Type" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background:
    radial-gradient(120% 90% at 50% -20%, rgba(183,121,31,0.07), transparent 55%), var(--deep-ink);
    padding: 26px 30px; }
  .specimen { font-family: "Syne", sans-serif; color: var(--text-hi); font-weight: 700; letter-spacing: -0.01em; font-size: 60px; line-height: 1; }
  .meta { font-family: var(--font-mono); font-size: 13px; letter-spacing: 0.14em; color: var(--text-dim); text-transform: uppercase; margin-top: 12px; }
  .weights { display: flex; gap: 26px; margin-top: 22px; flex-wrap: wrap; }
  .w { font-family: "Syne", sans-serif; color: var(--text); font-size: 26px; }
  .w span { display: block; font-family: var(--font-mono); font-size: 13px; letter-spacing: 0.1em; color: var(--text-dim); margin-top: 6px; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="specimen">Midgard</div>
  <div class="meta">Syne · Display · weight 700 · the production face</div>
  <div class="weights">
    <div class="w" style="font-weight:400">Aa<span>Regular 400</span></div>
    <div class="w" style="font-weight:500">Aa<span>Medium 500</span></div>
    <div class="w" style="font-weight:600">Aa<span>Semibold 600</span></div>
    <div class="w" style="font-weight:700">Aa<span>Bold 700</span></div>
    <div class="w" style="font-weight:800">Aa<span>Extra 800</span></div>
  </div>
</body>
</html>
