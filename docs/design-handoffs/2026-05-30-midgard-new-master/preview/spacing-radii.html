<!-- @dsCard group="Spacing" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--deep-ink); padding: 26px 30px; }
  .cap { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.14em; color: var(--text-faint); text-transform: uppercase; margin-bottom: 18px; }
  .grid { display: flex; gap: 30px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 80px; height: 56px; background: linear-gradient(180deg, rgba(215,226,216,0.04), transparent), #0c1610; border: 1px solid var(--panel-edge-strong); }
  .nm { font-family: var(--font-mono); font-size: 11px; color: var(--text-hi); }
  .px { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); }
</style>
</head>
<body>
  <div class="cap">Corner radii — tight, architectural</div>
  <div class="grid">
    <div class="item"><div class="box" style="border-radius:4px"></div><div class="nm">--r-sm</div><div class="px">4px · chips</div></div>
    <div class="item"><div class="box" style="border-radius:6px"></div><div class="nm">--r</div><div class="px">6px · buttons</div></div>
    <div class="item"><div class="box" style="border-radius:8px"></div><div class="nm">--r-lg</div><div class="px">8px · panels</div></div>
    <div class="item"><div class="box" style="border-radius:50%;width:56px"></div><div class="nm">round</div><div class="px">dots · logo</div></div>
  </div>
</body>
</html>
