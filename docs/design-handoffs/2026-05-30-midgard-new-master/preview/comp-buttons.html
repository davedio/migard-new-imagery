<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../midgard.css">
<style>
  body { margin: 0; background:
    radial-gradient(100% 80% at 50% 120%, rgba(32,190,67,0.06), transparent 60%), var(--deep-ink);
    padding: 26px 30px; }
  .cap { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.14em; color: var(--text-faint); text-transform: uppercase; margin-bottom: 16px; }
  .grid { display: grid; grid-template-columns: auto auto 1fr; gap: 14px 18px; align-items: center; }
  .state { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.16em; color: var(--text-faint); text-transform: uppercase; }
  /* static hover renders so both states read at a glance */
  .btn--primary.is-hover {
    border-color: var(--midgard-green);
    box-shadow: inset 0 0 24px rgba(32,190,67,0.22), 0 8px 30px -12px var(--green-glow);
    transform: translateY(-1px);
  }
  .btn--ghost.is-hover { border-color: var(--gold-line); color: var(--gold-bright); background: var(--gold-ghost); }
  .note { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); margin-top: 20px; line-height: 1.8; grid-column: 1 / -1; }
</style>
</head>
<body>
  <div class="cap">Buttons — default &amp; hover</div>
  <div class="grid">
    <span class="state">Primary</span>
    <button class="btn btn--primary">Explore Testnet →</button>
    <button class="btn btn--primary is-hover">Explore Testnet →</button>

    <span class="state">Ghost</span>
    <button class="btn btn--ghost">See How It Works</button>
    <button class="btn btn--ghost is-hover">See How It Works</button>
  </div>
  <div class="note">Primary = the key off-page CTA (Explore Testnet) · stronger green fill + border for definition, lifts &amp; glows on hover · ghost picks up a gold edge on hover.</div>
</body>
</html>
